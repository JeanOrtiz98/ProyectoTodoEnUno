<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SportStock - Sistema de Gestión de Inventario Deportivo">
    <title>SportStock - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <!-- Logo y título -->
        <div class="login-header">
            <div class="logo">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3v18h18"></path>
                    <path d="M18 17V9"></path>
                    <path d="M13 17V5"></path>
                    <path d="M8 17v-3"></path>
                </svg>
            </div>
            <h1>SportStock</h1>
            <p>Sistema de Gestión de Inventario Deportivo</p>
        </div>

        <!-- Formulario de login -->
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Ingresa tu usuario"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Ingresa tu contraseña"
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Recordar sesión</label>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Iniciar Sesión
            </button>

            <div class="login-help">
                <p>Usuarios de prueba:</p>
                <ul>
                    <li><strong>admin</strong> / pass: admin123 (Administrador)</li>
                    <li><strong>empleado</strong> / pass: emp123 (Empleado)</li>
                </ul>
            </div>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <p>&copy; 2024 SportStock. Todos los derechos reservados.</p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
